<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>דוח מפורט ללקוח</title>

<style>
@page{ margin:0; size:auto; }

*{
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

body{
    margin:0;
    padding:14px;
    background:linear-gradient(180deg,#f8fafc 0%, #f1f5f9 100%);
    color:#1e293b;
}

.container{ max-width:850px; margin:auto; }

.card{
    background:rgba(255,255,255,0.92);
    border-radius:28px;
    padding:20px;
    border:1px solid rgba(255,255,255,0.6);
    box-shadow:0 10px 35px rgba(15,23,42,0.08);
    margin-bottom:22px;
}

.title{
    text-align:center;
    font-size:30px;
    margin-bottom:5px;
    color:#111827;
}

.subtitle{
    text-align:center;
    color:#6b7280;
    margin-bottom:25px;
    font-size:14px;
}

.input-group{ margin-bottom:16px; }

.balance-row{
    display:flex;
    gap:10px;
    align-items:center;
}

.balance-row input{ flex:1; }

.status-btn{
    width:52px;
    min-width:52px;
    height:52px;
    border:none;
    border-radius:14px;
    font-size:24px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
}

.green-btn{ background:#dcfce7; }
.red-btn{ background:#fee2e2; }

.selected-status{
    outline:3px solid #0f172a;
}

label{
    display:block;
    margin-bottom:7px;
    font-weight:600;
    font-size:15px;
}

input{
    width:100%;
    border:none;
    background:#f3f4f6;
    border-radius:14px;
    padding:14px;
    font-size:17px;
    outline:none;
}

input:focus{ background:#e8eefc; }

.main-btn,
.print-btn{
    width:100%;
    border:none;
    border-radius:18px;
    padding:15px;
    font-size:17px;
    font-weight:700;
    cursor:pointer;
    background:linear-gradient(135deg,#334155,#1e293b);
    color:white;
    margin-top:18px;
}

.hidden{ display:none; }

.top-box{
    background:linear-gradient(135deg,#ffffff 0%, #f8fafc 100%);
    color:#0f172a;
    border-radius:24px;
    padding:20px;
    text-align:center;
    margin-bottom:16px;
    border:1px solid #e2e8f0;
}

.middle{
    display:flex;
    gap:12px;
    margin-bottom:14px;
}

.middle > div{ flex:1; }

.table-card{
    background:#ffffff;
    border-radius:24px;
    overflow:hidden;
    border:1px solid #eef2f7;
}

.rm-table-card td,
.lm-table-card td{
    font-size:15px;
    font-weight:600;
    padding:12px 8px;
}

.rm-table-card td:last-child,
.lm-table-card td:last-child{
    font-size:17px;
    font-weight:700;
}

.table-title{
    background:#f8fafc;
    color:#334155;
    padding:12px;
    text-align:center;
    font-weight:700;
    font-size:15px;
    border-bottom:1px solid #eef2f7;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:12px 8px;
    border-bottom:1px solid #eef2f7;
    text-align:center;
    font-size:14px;
}

th{ background:#f8fafc; }

.summary-wrapper{
    display:flex;
    justify-content:center;
    padding:12px;
    background:#f8fafc;
}

.summary-table{
    width:100%;
    max-width:430px;
    background:white;
    border-radius:18px;
    overflow:hidden;
}

.summary-table td:first-child,
.summary-table th:first-child{
    width:50%;
    font-weight:600;
}

.summary-table td:last-child,
.summary-table th:last-child{
    width:50%;
    font-weight:700;
}

.total-row{
    background:linear-gradient(135deg,#2563eb 0%,#1d4ed8 100%);
    box-shadow:0 6px 18px rgba(37,99,235,0.25);
}

.total-row td{
    padding:16px 10px;
    font-size:17px;
    font-weight:800;
    color:white;
    white-space:nowrap;
    border-bottom:none;
}

.notice{
    margin-top:14px;
    background:#fff;
    border:1px solid #e2e8f0;
    color:#475569;
    padding:14px;
    border-radius:18px;
    line-height:1.7;
    font-size:13px;
}

@media(max-width:700px){
    .middle{ flex-direction:column; }
}

@media print{
    html,body{
        margin:0 !important;
        padding:0 !important;
        background:white !important;
        overflow:hidden;
    }

    body{ zoom:0.87; }

    .container{
        max-width:100%;
        margin:0;
        padding:0;
    }

    .card{
        box-shadow:none !important;
        border:none !important;
        margin:0 !important;
        padding:0 !important;
    }

    .form-page,
    .print-btn{
        display:none !important;
    }
}
</style>
</head>

<body>

<div class="container">

<div class="card form-page">

<div class="title">✨מחשבון המכובדים✨</div>
<div class="subtitle">הזן את הפרטים להפקת דוח מסודר ללקוח</div>

<div class="input-group">
<label>פרטי הלקוח</label>
<input type="text" id="i_1">
</div>

<div class="input-group">
<label>סכום העברה</label>
<input type="number" id="x_1">
</div>

<div class="input-group">
<label>אחוז משיכה</label>
<input type="number" id="i_3">
</div>

<div class="input-group">
<label>אחוז עמלה</label>
<input type="number" id="i_4">
</div>

<div class="input-group">
<label>אחוז תיווך</label>
<input type="number" id="i_5">
</div>

<div class="input-group">
<label>יתרה בזכות/חובה</label>

<div class="balance-row">
<input type="number" id="i_6">

<button type="button" class="status-btn green-btn" onclick="setBalanceType('green')">🟢</button>
<button type="button" class="status-btn red-btn" onclick="setBalanceType('red')">🔴</button>
</div>
</div>

<button class="main-btn" onclick="generateReport()">צור דוח לקוח →</button>

</div>


<div class="card hidden" id="reportPage">

<div class="top-box">
<h2 id="clientInfo"></h2>
</div>

<div class="middle">

<div class="table-card lm-table-card">
<div class="table-title">נתוני העברה 💸</div>

<table>
<tr>
<td>סכום ההעברה</td>
<td id="transferAmount"></td>
</tr>

<tr>
<td>סכום לפני מע״מ</td>
<td id="beforeVat"></td>
</tr>
</table>
</div>

<div class="table-card rm-table-card">
<div class="table-title">עמלות וחישובים 📊</div>

<table>
<tr>
<th style="width:65%">סוג עמלה</th>
<th style="width:35%">סכום</th>
</tr>

<tr>
<td id="withdrawType"></td>
<td id="withdrawAmount"></td>
</tr>

<tr>
<td id="costType"></td>
<td id="costAmount"></td>
</tr>

<tr>
<td id="brokerType"></td>
<td id="brokerAmount"></td>
</tr>
</table>
</div>

</div>


<div class="table-card">

<div class="table-title">סיכום ללקוח 📦</div>

<div class="summary-wrapper">

<table class="summary-table">

<tr>
<th>פירוט</th>
<th>סכום</th>
</tr>

<tr>
<td>סכום ללקוח</td>
<td id="clientTotal"></td>
</tr>

<tr>
<td>סכום למתווך</td>
<td id="brokerTotal"></td>
</tr>

<tr>
<td>סכום מקורי למסירה</td>
<td id="originalDeliveryTotal"></td>
</tr>

<tr id="balanceRow" class="hidden">
<td id="balanceLabel"></td>
<td id="balanceValue"></td>
</tr>

<tr class="total-row">
<td style="font-size:15px;">סכום למסירה בפועל ✨</td>
<td id="deliveryTotal"></td>
</tr>

</table>

</div>
</div>

<div class="notice">
אחוז המשיכה מחושב לפי הסכום כולל מע״מ
ואחוז העלות והתיווך מחושב לפי הסכום לפני מע״מ
</div>

<button class="print-btn" onclick="window.print()">הדפס דוח 🖨️</button>

</div>
</div>

<script>

function formatNumber(num){
    return Number(num).toLocaleString('he-IL', {
        maximumFractionDigits:0
    });
}

let balanceType = '';

function setBalanceType(type){

    balanceType = type;

    document.querySelectorAll('.status-btn').forEach(btn => {
        btn.classList.remove('selected-status');
    });

    if(type === 'green'){
        document.querySelector('.green-btn').classList.add('selected-status');
    }

    if(type === 'red'){
        document.querySelector('.red-btn').classList.add('selected-status');
    }
}

function generateReport(){

    const i_1 = document.getElementById('i_1').value;
    const x_1 = parseFloat(document.getElementById('x_1').value) || 0;
    const i_3 = parseFloat(document.getElementById('i_3').value) || 0;
    const i_4 = parseFloat(document.getElementById('i_4').value) || 0;
    const i_5 = parseFloat(document.getElementById('i_5').value) || 0;
    const i_6 = parseFloat(document.getElementById('i_6').value) || 0;

    const x_2 = x_1 / 1.18;
    const x_3 = x_1 * (i_3 / 100);
    const x_4 = x_2 * (i_4 / 100);
    const x_5 = x_2 * (i_5 / 100);

    const s_1 = x_1 - x_3 - x_4;
    const totalDelivery = s_1 + x_5;

    let finalDelivery = totalDelivery;

    document.getElementById('clientInfo').innerHTML =
        'דוח ללקוח - ' + i_1;

    document.getElementById('transferAmount').innerHTML =
        formatNumber(x_1);

    document.getElementById('beforeVat').innerHTML =
        formatNumber(x_2);

    document.getElementById('withdrawType').innerHTML =
        'משיכה (' + i_3 + '%)';

    document.getElementById('withdrawAmount').innerHTML =
        formatNumber(x_3);

    document.getElementById('costType').innerHTML =
        'עלות (' + i_4 + '%)';

    document.getElementById('costAmount').innerHTML =
        formatNumber(x_4);

    document.getElementById('brokerType').innerHTML =
        'תיווך (' + i_5 + '%)';

    document.getElementById('brokerAmount').innerHTML =
        formatNumber(x_5);

    document.getElementById('clientTotal').innerHTML =
        formatNumber(s_1);

    document.getElementById('brokerTotal').innerHTML =
        formatNumber(x_5);

    document.getElementById('originalDeliveryTotal').innerHTML =
        formatNumber(totalDelivery);

    const balanceRow = document.getElementById('balanceRow');
    const balanceLabel = document.getElementById('balanceLabel');
    const balanceValue = document.getElementById('balanceValue');

    if(i_6 > 0 && balanceType === 'green'){

        balanceRow.classList.remove('hidden');

        balanceLabel.innerHTML =
            '🟢 יתרה ללקוח';

        balanceValue.innerHTML =
           formatNumber(i_6)+ '-';

        finalDelivery =
            totalDelivery - i_6;
    }

    else if(i_6 > 0 && balanceType === 'red'){

        balanceRow.classList.remove('hidden');

        balanceLabel.innerHTML =
            '🔴 חוב על הלקוח ';

        balanceValue.innerHTML =
             formatNumber(i_6)+'+';

        finalDelivery =
            totalDelivery + i_6;
    }

    else{
        balanceRow.classList.add('hidden');
    }

    document.getElementById('deliveryTotal').innerHTML =
        formatNumber(finalDelivery);

    document.getElementById('reportPage').classList.remove('hidden');

    window.scrollTo({
        top:document.body.scrollHeight,
        behavior:'smooth'
    });
}

</script>

</body>
</html>
