
<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>טופס לקוח</title>

<style>

*{
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

body{
    margin:0;
    padding:14px;
    background:linear-gradient(180deg,#f8fafc 0%, #f1f5f9 100%);
    -webkit-text-size-adjust:100%;
    color:#1e293b;
}

.container{
    max-width:850px;
    margin:auto;
}

.card{
    background:rgba(255,255,255,0.92);
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);
    border-radius:28px;
    padding:20px;
    border:1px solid rgba(255,255,255,0.6);
    box-shadow:0 10px 35px rgba(15,23,42,0.08);
    margin-bottom:22px;
}

.title{
    text-align:center;
    font-size:30px;
    margin-bottom:5px;
    color:#111827;
}

.subtitle{
    text-align:center;
    color:#6b7280;
    margin-bottom:25px;
    font-size:14px;
}

.input-group{
    margin-bottom:16px;
}

label{
    display:block;
    margin-bottom:7px;
    font-weight:600;
    font-size:15px;
}

input{
    width:100%;
    border:none;
    background:#f3f4f6;
    border-radius:14px;
    padding:14px;
    font-size:17px;
    outline:none;
}

input:focus{
    background:#e8eefc;
}

.main-btn,
.print-btn{
    width:100%;
    border:none;
    border-radius:18px;
    padding:15px;
    font-size:17px;
    font-weight:700;
    cursor:pointer;
    transition:0.2s;
    background:linear-gradient(135deg,#334155,#1e293b);
    color:white;
    margin-top:18px;
    box-shadow:0 8px 18px rgba(15,23,42,0.12);
}

.main-btn:active,
.print-btn:active{
    transform:scale(0.98);
}

.hidden{
    display:none;
}

.top-box{
    background:linear-gradient(135deg,#ffffff 0%, #f8fafc 100%);
    color:#0f172a;
    border-radius:24px;
    padding:24px;
    text-align:center;
    margin-bottom:22px;
    border:1px solid #e2e8f0;
    box-shadow:0 4px 14px rgba(15,23,42,0.04);
}

.top-box h2{
    margin:0;
    font-size:24px;
}

.middle{
    display:flex;
    gap:16px;
    margin-bottom:20px;
}

.middle > div{
    flex:1;
}

.table-card{
    background:#ffffff;
    border-radius:24px;
    overflow:hidden;
    border:1px solid #eef2f7;
    box-shadow:0 3px 12px rgba(15,23,42,0.03);
}

.rm-table-card td{
    font-size:16px;
    font-weight:600;
    padding:16px 10px;
}

.rm-table-card th{
    font-size:15px;
    padding:16px 10px;
}

.rm-table-card td:last-child{
    font-size:18px;
    color:#0f172a;
    font-weight:700;
}

.lm-table-card td{
    font-size:16px;
    font-weight:600;
    padding:16px 10px;
}

.lm-table-card td:last-child{
    font-size:18px;
    color:#0f172a;
    font-weight:700;
}

.rm-table-card{
    background:#ffffff;
    border-radius:24px;
    overflow:hidden;
    border:1px solid #eef2f7;
    box-shadow:0 3px 12px rgba(15,23,42,0.03);
}

.table-title{
    background:#f8fafc;
    color:#334155;
    padding:14px;
    text-align:center;
    font-weight:700;
    font-size:15px;
    border-bottom:1px solid #eef2f7;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,
td{
    padding:14px 10px;
    border-bottom:1px solid #eef2f7;
    text-align:center;
    font-size:14px;
    line-height:1.5;
}

th{
    background:#f8fafc;
    color:#475569;
    font-weight:700;
}

tr:last-child td{
    border-bottom:none;
}

.summary-wrapper{
    display:flex;
    justify-content:center;
    padding:22px;
    background:#f8fafc;
}

.summary-table{
    width:100%;
    max-width:420px;
    table-layout:fixed;
    background:white;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 2px 10px rgba(15,23,42,0.04);
}

.summary-table td:first-child,
.summary-table th:first-child{
    width:45%;
    font-weight:600;
    color:#334155;
}

.summary-table td:last-child,
.summary-table th:last-child{
    width:55%;
    font-weight:700;
    color:#0f172a;
}

.total-row{
    background:linear-gradient(135deg,#dbeafe,#eff6ff);
    font-weight:800;
    font-size:18px;
}

.total-row td{
    padding:18px 12px;
    color:#0f172a;
    border-top:2px solid #93c5fd;
}

.total-row td:last-child{
    font-size:22px;
    color:#1d4ed8;
    letter-spacing:0.5px;
}

.notice{
    margin-top:20px;
    background:#fff;
    border:1px solid #e2e8f0;
    color:#475569;
    padding:18px;
    border-radius:18px;
    line-height:1.9;
    font-size:14px;
}

@media(max-width:700px){

    .middle{
        flex-direction:column;
    }

    .title{
        font-size:26px;
    }

    th,
    td{
        font-size:13px;
        padding:10px 6px;
    }

}

@media print{

    body{
        background:white;
        padding:0;
    }

    .form-page,
    .print-btn{
        display:none !important;
    }

    .card{
        box-shadow:none;
        border:none;
        padding:0;
    }

}

</style>
</head>

<body>

<div class="container">

    <!-- FORM -->

    <div class="card form-page">

        <div class="title">טופס לקוח ✨</div>
        <div class="subtitle">הזן את הפרטים ליצירת דוח מסודר</div>

        <div class="input-group">
            <label>פרטי הלקוח</label>
            <input type="text" id="i_1" placeholder="שם / פרטי לקוח">
        </div>

        <div class="input-group">
            <label>סכום העברה</label>
            <input type="number" id="x_1" placeholder="0">
        </div>

        <div class="input-group">
            <label>אחוז משיכה</label>
            <input type="number" id="i_3" placeholder="0">
        </div>

        <div class="input-group">
            <label>אחוז עמלה</label>
            <input type="number" id="i_4" placeholder="0">
        </div>

        <div class="input-group">
            <label>אחוז תיווך</label>
            <input type="number" id="i_5" placeholder="0">
        </div>

        <button class="main-btn" onclick="generateReport()">
            צור דוח לקוח →
        </button>

    </div>


    <!-- REPORT -->

    <div class="card hidden" id="reportPage">

        <div class="top-box">
            <h2 id="clientInfo"></h2>
        </div>


        <!-- MIDDLE -->

        <div class="middle">

            <!-- LEFT -->

            <div class="table-card lm-table-card">

                <div class="table-title">נתוני העברה 💸</div>

                <table>

                    <tr>
                        <td>סכום ההעברה</td>
                        <td id="transferAmount"></td>
                    </tr>

                    <tr>
                        <td>סכום לפני מע״מ</td>
                        <td id="beforeVat"></td>
                    </tr>

                </table>

            </div>


            <!-- RIGHT -->

            <div class="table-card rm-table-card">

                <div class="table-title">עמלות וחישובים 📊</div>

                <table>

                    <tr>
                        <th style="width:65%;">סוג עמלה</th>
                        <th style="width:35%;">סכום</th>
                    </tr>

                    <tr>
                        <td id="withdrawType"></td>
                        <td id="withdrawAmount"></td>
                    </tr>

                    <tr>
                        <td id="costType"></td>
                        <td id="costAmount"></td>
                    </tr>

                    <tr>
                        <td id="brokerType"></td>
                        <td id="brokerAmount"></td>
                    </tr>

                </table>

            </div>

        </div>


        <!-- BOTTOM -->

        <div class="table-card">

            <div class="table-title">סיכום ללקוח 📦</div>

            <div class="summary-wrapper">

            <table class="summary-table">

                <tr>
                    <th>פירוט</th>
                    <th>סכום</th>
                </tr>

                <tr>
                    <td>סכום ללקוח</td>
                    <td id="clientTotal"></td>
                </tr>

                <tr>
                    <td>סכום למתווך</td>
                    <td id="brokerTotal"></td>
                </tr>

                <tr class="total-row">
                    <td>סכום כולל למסירה ✨</td>
                    <td id="deliveryTotal"></td>
                </tr>

            </table>

            </div>

        </div>


        <div class="notice">
            אחוז המשיכה מחושב לפי הסכום כולל מע״מ ואחוז העלות והתיווך מחושב לפי הסכום לפני מע״מ
        </div>


        <button class="print-btn" onclick="window.print()">
            הדפס דוח 🖨️
        </button>

    </div>

</div>


<script>

function formatNumber(num){

    return Number(num).toLocaleString('he-IL', {
        maximumFractionDigits:0
    });

}

function generateReport(){

    const i_1 = document.getElementById('i_1').value;

    const x_1 = parseFloat(document.getElementById('x_1').value) || 0;

    const i_3 = parseFloat(document.getElementById('i_3').value) || 0;

    const i_4 = parseFloat(document.getElementById('i_4').value) || 0;

    const i_5 = parseFloat(document.getElementById('i_5').value) || 0;


    const x_2 = x_1 / 1.18;

    const x_3 = x_1 * (i_3 / 100);

    const x_4 = x_2 * (i_4 / 100);

    const x_5 = x_2 * (i_5 / 100);

    const s_1 = x_1 - x_3 - x_4;

    const totalDelivery = s_1 + x_5;


    document.getElementById('clientInfo').innerHTML =
        'מידע ללקוח - ' + i_1;


    document.getElementById('transferAmount').innerHTML =
        formatNumber(x_1);

    document.getElementById('beforeVat').innerHTML =
        formatNumber(x_2);


    document.getElementById('withdrawType').innerHTML =
        'משיכה <span style="color:#64748b;font-size:12px;">(' + i_3 + '%)</span>';

    document.getElementById('withdrawAmount').innerHTML =
        formatNumber(x_3);


    document.getElementById('costType').innerHTML =
        'עלות <span style="color:#64748b;font-size:12px;">(' + i_4 + '%)</span>';

    document.getElementById('costAmount').innerHTML =
        formatNumber(x_4);


    document.getElementById('brokerType').innerHTML =
        'תיווך <span style="color:#64748b;font-size:12px;">(' + i_5 + '%)</span>';

    document.getElementById('brokerAmount').innerHTML =
        formatNumber(x_5);


    document.getElementById('clientTotal').innerHTML =
        formatNumber(s_1);

    document.getElementById('brokerTotal').innerHTML =
        formatNumber(x_5);

    document.getElementById('deliveryTotal').innerHTML =
        formatNumber(totalDelivery);


    document.getElementById('reportPage').classList.remove('hidden');


    window.scrollTo({
        top:document.body.scrollHeight,
        behavior:'smooth'
    });

}

</script>

</body>
</html>
```
