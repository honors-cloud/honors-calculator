<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>מחשבון המכובדים</title>

<style>
body{
    font-family: Arial;
    direction: rtl;
    background:#f4f6f8;
    padding:20px;
}

.container{
    max-width:650px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{text-align:center;}

input{
    width:100%;
    padding:12px;
    margin-bottom:10px;
    font-size:18px;
    border-radius:10px;
    border:1px solid #ccc;
}

.calc{
    width:100%;
    padding:14px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:#2d89ef;
    color:white;
}

.row{
    display:flex;
    gap:8px;
    margin-top:8px;
}

.row button{
    flex:1;
    padding:12px;
    border:none;
    border-radius:10px;
}

.client{background:#28a745;color:white;}
.broker{background:#ff9800;color:white;}
.honor{background:#6f42c1;color:white;}

.wa{
    width:50px;
    background:#25D366;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:10px;
}

table{
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
}

td, th{
    padding:10px;
    border-bottom:1px solid #ddd;
    text-align:center;
}

th{
    background:#2d89ef;
    color:white;
}

/* ===== הדפסה ===== */
@page {
    size: A4;
    margin: 0;
}

@media print{
    body *{visibility:hidden;}
    .print-area, .print-area *{visibility:visible;}
    .print-area{
        position:absolute;
        top:0;
        left:0;
        width:100%;
        padding:20px;
        background:white;
    }
}
</style>
</head>

<body>

<div class="container">

<h2>💰 מחשבון המכובדים</h2>

<input type="number" id="amount" placeholder="סכום">
<input type="number" id="commission" placeholder="אחוז עמלה">
<input type="number" id="withdraw" placeholder="אחוז משיכה">
<input type="number" id="broker" placeholder="אחוז תיווך">

<button class="calc" onclick="calculate()">חשב</button>

<div class="row">
<button class="client" onclick="printClient()">🧾 ללקוח</button>
<button class="wa" onclick="shareClient()">📤</button>
</div>

<div class="row">
<button class="broker" onclick="printBroker()">🤝 למתווך</button>
<button class="wa" onclick="shareBroker()">📤</button>
</div>

<div class="row">
<button class="honor" onclick="printHonor()">🏦 למכובדים</button>
<button class="wa" onclick="shareHonor()">📤</button>
</div>

<table id="mainTable" style="display:none;">
<tr><th>פרמטר</th><th>סכום</th><th>אחוז</th></tr>

<tr><td>סכום</td><td id="t_amount"></td><td>-</td></tr>
<tr><td>לפני מע״מ</td><td id="t_before"></td><td>-</td></tr>

<tr><td>עמלה</td><td id="t_commission"></td><td id="p_commission"></td></tr>
<tr><td>משיכה</td><td id="t_withdraw"></td><td id="p_withdraw"></td></tr>
<tr><td>תיווך</td><td id="t_broker"></td><td id="p_broker"></td></tr>

<tr><td>לקוח מקבל</td><td id="t_client"></td><td>-</td></tr>
<tr><td>נשאר למכובדים</td><td id="t_honor"></td><td>-</td></tr>
</table>

<div id="printArea" class="print-area"></div>

</div>

<script>

let data={};

function f(n){
return Math.round(n).toLocaleString('he-IL')+" ₪";
}

function calculate(){

let x=parseFloat(amount.value)||0;
let c1=parseFloat(commission.value)||0;
let c2=parseFloat(withdraw.value)||0;
let c3=parseFloat(broker.value)||0;

let before=x/1.18;
let commissionA=before*(c1/100);
let withdrawA=x*(c2/100);
let brokerA=before*(c3/100);
let client=x-commissionA-withdrawA;
let honor=x-client-brokerA;

data={x,before,c1,c2,c3,commissionA,withdrawA,brokerA,client,honor};

t_amount.innerText=f(x);
t_before.innerText=f(before);
t_commission.innerText=f(commissionA);
t_withdraw.innerText=f(withdrawA);
t_broker.innerText=f(brokerA);
t_client.innerText=f(client);
t_honor.innerText=f(honor);

p_commission.innerText=c1+"%";
p_withdraw.innerText=c2+"%";
p_broker.innerText=c3+"%";

mainTable.style.display="table";
}

/* ===== הדפסות מעוצבות ===== */

function printClient(){
if(!data.x)return alert("חשב קודם");

printArea.innerHTML=`
<h2 style="text-align:center;">🧾 דוח ללקוח</h2>

<div style="background:#fff3cd;padding:10px;border-radius:10px;margin-bottom:15px;text-align:center;font-weight:bold;">
אחוז המשיכה מהסכום הכולל ואחוז העמלה מהסכום לפני מע״מ
</div>

<table>
<tr style="background:#2d89ef;color:white;">
<th>פרמטר</th><th>סכום</th><th>אחוז</th>
</tr>

<tr><td>💰 סכום</td><td>${f(data.x)}</td><td>-</td></tr>
<tr><td>🧾 לפני מע״מ</td><td>${f(data.before)}</td><td>-</td></tr>

<tr>
<td>📤 עמלה</td>
<td style="color:#2d89ef;font-weight:bold;">${f(data.commissionA)}</td>
<td>${data.c1}%</td>
</tr>

<tr>
<td>🏧 משיכה</td>
<td style="color:#e53935;font-weight:bold;">${f(data.withdrawA)}</td>
<td>${data.c2}%</td>
</tr>

<tr style="background:#e8f5e9;font-weight:bold;">
<td>✅ לקוח מקבל</td>
<td style="color:green;">${f(data.client)}</td>
<td>-</td>
</tr>
</table>`;
window.print();
}

function printBroker(){
if(!data.x)return alert("חשב קודם");

printArea.innerHTML=`
<h2 style="text-align:center;">🤝 דוח למתווך</h2>

<div style="background:#ffe0b2;padding:10px;border-radius:10px;margin-bottom:15px;text-align:center;font-weight:bold;color:#d84315;">
האחוז מחושב מהסכום לפני מע״מ
</div>

<table>
<tr style="background:#ff9800;color:white;">
<th>פרמטר</th><th>סכום</th><th>אחוז</th>
</tr>

<tr><td>💰 סכום</td><td>${f(data.x)}</td><td>-</td></tr>
<tr><td>🧾 לפני מע״מ</td><td>${f(data.before)}</td><td>-</td></tr>

<tr style="background:#fff3e0;font-weight:bold;">
<td>🤝 תיווך</td>
<td style="color:#ff9800;">${f(data.brokerA)}</td>
<td>${data.c3}%</td>
</tr>
</table>`;
window.print();
}

function printHonor(){
if(!data.x)return alert("חשב קודם");

printArea.innerHTML=`
<h2 style="text-align:center;">🏦 דוח למכובדים</h2>

<table>
<tr style="background:#6f42c1;color:white;">
<th>פרמטר</th><th>סכום</th><th>אחוז</th>
</tr>

<tr><td>💰 סכום</td><td>${f(data.x)}</td><td>-</td></tr>
<tr><td>🧾 לפני מע״מ</td><td>${f(data.before)}</td><td>-</td></tr>

<tr><td>📤 עמלה</td><td>${f(data.commissionA)}</td><td>${data.c1}%</td></tr>
<tr><td>🏧 משיכה</td><td>${f(data.withdrawA)}</td><td>${data.c2}%</td></tr>
<tr><td>🤝 תיווך</td><td>${f(data.brokerA)}</td><td>${data.c3}%</td></tr>
<tr><td>✅ לקוח</td><td>${f(data.client)}</td><td>-</td></tr>

<tr style="background:#f3e5f5;font-weight:bold;">
<td>🏦 נשאר</td>
<td>${f(data.honor)}</td>
<td>-</td>
</tr>
</table>`;
window.print();
}

/* ===== וואטסאפ ===== */

function shareClient(){
if(!data.x)return alert("חשב קודם");

let text=`🧾 דוח ללקוח

סכום: ${f(data.x)}
לפני מע״מ: ${f(data.before)}

עמלה (${data.c1}%): ${f(data.commissionA)}
משיכה (${data.c2}%): ${f(data.withdrawA)}

לקוח מקבל: ${f(data.client)}`;

window.open("https://wa.me/?text="+encodeURIComponent(text));
}

function shareBroker(){
if(!data.x)return alert("חשב קודם");

let text=`🤝 דוח למתווך

סכום: ${f(data.x)}
לפני מע״מ: ${f(data.before)}

תיווך (${data.c3}%): ${f(data.brokerA)}`;

window.open("https://wa.me/?text="+encodeURIComponent(text));
}

function shareHonor(){
if(!data.x)return alert("חשב קודם");

let text=`🏦 דוח למכובדים

סכום: ${f(data.x)}
לפני מע״מ: ${f(data.before)}

עמלה: ${f(data.commissionA)}
משיכה: ${f(data.withdrawA)}
תיווך: ${f(data.brokerA)}

לקוח: ${f(data.client)}
נשאר: ${f(data.honor)}`;

window.open("https://wa.me/?text="+encodeURIComponent(text));
}

</script>

</body>
</html>
