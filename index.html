<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>טופס מידע ללקוח</title>

<style>
    *{
        box-sizing:border-box;
        font-family:Arial, sans-serif;
    }

    body{
        margin:0;
        background:#f5f5f5;
        padding:20px;
    }

    .form-container{
        max-width:500px;
        margin:auto;
        background:white;
        padding:25px;
        border-radius:12px;
        box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    h2{
        text-align:center;
        margin-bottom:25px;
    }

    label{
        display:block;
        margin-top:15px;
        margin-bottom:5px;
        font-weight:bold;
    }

    input{
        width:100%;
        padding:12px;
        border:1px solid #ccc;
        border-radius:8px;
        font-size:16px;
    }

    button{
        width:100%;
        padding:14px;
        margin-top:25px;
        border:none;
        background:#007bff;
        color:white;
        font-size:18px;
        border-radius:10px;
        cursor:pointer;
    }

    button:hover{
        background:#0056b3;
    }

    /* OUTPUT PAGE */

    .output-page{
        display:none;
        background:white;
        min-height:100vh;
        padding:20px;
    }

    .top-area{
        border:2px solid #000;
        padding:20px;
        text-align:center;
        font-size:24px;
        font-weight:bold;
        margin-bottom:20px;
    }

    .middle{
        display:flex;
        gap:20px;
        margin-bottom:20px;
    }

    .left-middle,
    .right-middle{
        flex:1;
        border:2px solid #000;
        padding:15px;
    }

    table{
        width:100%;
        border-collapse:collapse;
    }

    td, th{
        border:1px solid #000;
        padding:10px;
        text-align:center;
    }

    .bottom-area{
        border:2px solid #000;
        min-height:120px;
        padding:20px;
    }

    .back-btn{
        margin-top:20px;
        background:#28a745;
    }

    @media print{
        .back-btn{
            display:none;
        }

        body{
            background:white;
            padding:0;
        }

        .output-page{
            padding:0;
        }
    }
</style>
</head>

<body>

<div class="form-container" id="formPage">

    <h2>טופס מידע ללקוח</h2>

    <label>פרטי הלקוח</label>
    <input type="text" id="i_1">

    <label>סכום העברה</label>
    <input type="number" id="x_1">

    <label>אחוז משיכה</label>
    <input type="number" id="i_3">

    <label>אחוז עמלה</label>
    <input type="number" id="i_4">

    <label>אחוז תיווך</label>
    <input type="number" id="i_5">

    <button onclick="generatePage()">הפק דוח</button>

</div>

<div class="output-page" id="outputPage">

    <!-- TOP -->
    <div class="top-area" id="topArea"></div>

    <!-- MIDDLE -->
    <div class="middle">

        <!-- LEFT MIDDLE -->
        <div class="left-middle">
            <table>
                <tbody id="leftTable"></tbody>
            </table>
        </div>

        <!-- RIGHT MIDDLE -->
        <div class="right-middle">
            <table>
                <tbody id="rightTable"></tbody>
            </table>
        </div>

    </div>

    <!-- BOTTOM -->
    <div class="bottom-area">
        אזור תחתון
    </div>

    <button class="back-btn" onclick="goBack()">חזרה</button>

</div>

<script>

function generatePage(){

    // Inputs
    let i_1 = document.getElementById("i_1").value;
    let x_1 = parseFloat(document.getElementById("x_1").value) || 0;
    let i_3 = parseFloat(document.getElementById("i_3").value) || 0;
    let i_4 = parseFloat(document.getElementById("i_4").value) || 0;
    let i_5 = parseFloat(document.getElementById("i_5").value) || 0;

    // Calculations
    let x_2 = x_1 / 1.18;

    let withdrawal = x_1 * (i_3 / 100);
    let commission = x_2 * (i_4 / 100);
    let brokerage = x_2 * (i_5 / 100);

    // TOP AREA
    document.getElementById("topArea").innerHTML =
        "מידע ללקוח - " + i_1;

    // RIGHT TABLE
    document.getElementById("rightTable").innerHTML = `
        <tr>
            <td>סכום ההעברה</td>
            <td>${x_1.toFixed(2)}</td>
        </tr>

        <tr>
            <td>סכום לפני מע״מ</td>
            <td>${x_2.toFixed(2)}</td>
        </tr>
    `;

    // LEFT TABLE
    document.getElementById("leftTable").innerHTML = `
        <tr>
            <td>משיכה</td>
            <td>${i_3}%</td>
            <td>${withdrawal.toFixed(2)}</td>
        </tr>

        <tr>
            <td>עלות</td>
            <td>${i_4}%</td>
            <td>${commission.toFixed(2)}</td>
        </tr>

        <tr>
            <td>תיווך</td>
            <td>${i_5}%</td>
            <td>${brokerage.toFixed(2)}</td>
        </tr>
    `;

    // Switch Pages
    document.getElementById("formPage").style.display = "none";
    document.getElementById("outputPage").style.display = "block";
}

function goBack(){
    document.getElementById("outputPage").style.display = "none";
    document.getElementById("formPage").style.display = "block";
}

</script>

</body>
</html>
